<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PSA Tracker">
<title>PSA Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    background-color: #cc0000;
    background-image: radial-gradient(circle at 50% 0%, #ff1a1a 0%, #cc0000 40%, #880000 100%);
    color: #1c1c1e;
  }
  body::before {
    content: ''; position: fixed; top: -120px; right: -120px;
    width: 300px; height: 300px; border-radius: 50%;
    border: 28px solid rgba(255,255,255,0.12); pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; bottom: -80px; left: -80px;
    width: 200px; height: 200px; border-radius: 50%;
    border: 20px solid rgba(255,255,255,0.08); pointer-events: none; z-index: 0;
  }
  header {
    background: rgba(0,0,0,0.35); padding: 16px 20px 14px;
    border-bottom: 2px solid rgba(255,255,255,0.15);
    position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px);
  }
  header h1 { font-size: 22px; font-weight: 700; color: white; }
  header p { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

  #lockScreen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 70vh; text-align: center; padding: 20px;
  }
  .pokeball {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(180deg, white 50%, #1c1c1e 50%);
    border: 5px solid #1c1c1e; position: relative;
    margin: 0 auto 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .pokeball::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); width: 22px; height: 22px;
    border-radius: 50%; background: white; border: 5px solid #1c1c1e; z-index: 2;
  }
  .pokeball::after {
    content: ''; position: absolute; top: calc(50% - 3px); left: 0; right: 0;
    height: 6px; background: #1c1c1e;
  }
  #lockScreen h2 { color: white; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  #lockScreen p { color: rgba(255,255,255,0.65); font-size: 14px; margin-bottom: 28px; }
  .lock-input {
    width: 100%; max-width: 280px; padding: 14px 18px; font-size: 18px;
    border-radius: 14px; border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15); color: white;
    text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 14px;
  }
  .lock-input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .lock-input:focus { border-color: rgba(255,255,255,0.7); }
  .lock-btn {
    width: 100%; max-width: 280px; padding: 14px; font-size: 16px; font-weight: 600;
    border-radius: 14px; border: none; background: white; color: #cc0000; cursor: pointer;
  }
  .lock-error { color: #ffcc00; font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 500; }

  #mainApp { display: none; }

  .mic-wrap { text-align: center; padding: 20px 0 10px; }
  .mic-btn {
    width: 92px; height: 92px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
  }
  .mic-btn.recording { border-color: #ffcc00; background: rgba(255,204,0,0.25); animation: pulse 1s infinite; }
  .mic-btn.processing { opacity: 0.6; }
  .mic-btn svg { width: 38px; height: 38px; color: white; }
  .mic-btn.recording svg { color: #ffcc00; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .mic-label { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 10px; font-weight: 500; }
  .mic-label.recording { color: #ffcc00; }

  .status {
    font-size: 13px; color: rgba(255,255,255,0.6); text-align: center;
    margin-top: 6px; min-height: 18px; font-style: italic; padding: 0 24px; line-height: 1.5;
  }
  .status.ok { color: #ffcc00; font-style: normal; font-weight: 600; }
  .status.err { color: #ff9999; font-style: normal; }

  .hint {
    font-size: 12px; color: rgba(255,255,255,0.55); text-align: center;
    margin: 10px 0 16px; line-height: 1.7; padding: 10px 16px;
    background: rgba(0,0,0,0.15); border-radius: 10px;
  }

  .card {
    background: rgba(255,255,255,0.96); border-radius: 16px;
    overflow: hidden; margin-bottom: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .card-title {
    font-size: 11px; font-weight: 700; color: #cc0000;
    text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 16px 6px;
    background: rgba(204,0,0,0.06); border-bottom: 1px solid rgba(204,0,0,0.1);
  }
  .field { display: flex; align-items: center; padding: 12px 16px; border-top: 0.5px solid #f0f0f0; }
  .field:first-of-type { border-top: none; }
  .field label { font-size: 15px; color: #1c1c1e; flex: 0 0 130px; }
  .field input, .field select {
    flex: 1; border: none; outline: none; font-size: 15px; color: #cc0000;
    background: transparent; text-align: right; font-family: inherit; min-width: 0;
  }
  .field input::placeholder { color: #c7c7cc; }
  .field select { -webkit-appearance: none; appearance: none; }

  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 15px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .btn.secondary { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3); }
  .btn.primary { background: #ffcc00; color: #1c1c1e; }
  .btn.primary:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }

  .logout { text-align: center; margin-top: 14px; margin-bottom: 20px; }
  .logout button { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; text-decoration: underline; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #1c1c1e; color: white; padding: 12px 22px; border-radius: 99px;
    font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🃏 PSA Tracker</h1>
  <p>Voice-powered card entry</p>
</header>

<div class="container" id="lockScreen">
  <div class="pokeball"></div>
  <h2>Welcome back!</h2>
  <p>Enter your password to continue</p>
  <input class="lock-input" type="password" id="passwordInput" placeholder="Password"
    onkeydown="if(event.key==='Enter') checkPassword()" autocomplete="current-password" />
  <button class="lock-btn" onclick="checkPassword()">Unlock</button>
  <div class="lock-error" id="lockError"></div>
</div>

<div class="container" id="mainApp">
  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="mic-label" id="micLabel">Tap to speak</div>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="hint">
    Speak naturally — for example:<br>
    <em>"Charizard ex, MEW set, 199 slash 165, Pit, 150 euros"</em>
  </div>

  <div class="card">
    <div class="card-title">Card info</div>
    <div class="field"><label>Card name</label><input id="f_card" placeholder="Charizard ex" /></div>
    <div class="field"><label>Set</label><input id="f_set" placeholder="MEW" /></div>
    <div class="field"><label>Number</label><input id="f_number" placeholder="199/165" /></div>
    <div class="field">
      <label>Owner</label>
      <select id="f_owner">
        <option value="P">Pit</option>
        <option value="T">Tom</option>
        <option value="S">Shared</option>
      </select>
    </div>
    <div class="field"><label>Purchase price (€)</label><input id="f_purchase" type="number" placeholder="0.00" inputmode="decimal" /></div>
  </div>

  <div class="btn-row">
    <button class="btn secondary" onclick="clearAll()">Clear</button>
    <button class="btn primary" id="saveBtn" onclick="saveToSheet()">Save to Sheet</button>
  </div>
  <div class="logout"><button onclick="logout()">Lock app</button></div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxCt1gsW5EmOtnSKdr8Vel7pLL0Ikl4Wn_DLZJHGsJD2TUc3VRNWvFTKx77fXFO_cCSwg/exec';
var PASSWORD = 'Kaiya1';
var recognition = null;
var isRecording = false;

function checkPassword() {
  if (document.getElementById('passwordInput').value === PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('lockError').textContent = '';
  } else {
    document.getElementById('lockError').textContent = 'Incorrect password. Try again.';
    document.getElementById('passwordInput').value = '';
  }
}

function logout() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
  clearAll();
}

function toggleMic() {
  if (isRecording) { stopRecording(); return; }
  startRecording();
}

function startRecording() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Speech recognition not available.', 'err'); return; }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = function() {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micLabel').textContent = 'Tap to stop';
    document.getElementById('micLabel').classList.add('recording');
    setStatus('Listening...', '');
  };

  recognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    setStatus('"' + transcript + '"', '');
    sendToAppsScript(transcript);
  };

  recognition.onerror = function(e) {
    setStatus('Mic error: ' + e.error + '. Try again.', 'err');
    resetMic();
  };

  recognition.onend = function() { resetMic(); };

  try { recognition.start(); }
  catch(e) { setStatus('Could not start mic. Try again.', 'err'); resetMic(); }
}

function stopRecording() {
  if (recognition) { try { recognition.stop(); } catch(e) {} }
}

function resetMic() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').classList.remove('processing');
  document.getElementById('micLabel').textContent = 'Tap to speak';
  document.getElementById('micLabel').classList.remove('recording');
}

function sendToAppsScript(transcript) {
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').classList.add('processing');
  document.getElementById('micLabel').textContent = 'Processing...';
  setStatus('Claude is reading your message...', '');

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'parseVoice', transcript: transcript })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.success && data.data) {
      fillFields(data.data);
      setStatus('Got it! Check and correct if needed.', 'ok');
    } else {
      setStatus('Could not understand. Please fill in manually.', 'err');
    }
    resetMic();
  })
  .catch(function(e) {
    setStatus('Error. Please fill in manually.', 'err');
    resetMic();
  });
}

function fillFields(data) {
  if (data.cardName) setVal('f_card', data.cardName);
  if (data.set) setVal('f_set', data.set.toUpperCase());
  if (data.number) setVal('f_number', data.number);
  if (data.owner) setVal('f_owner', data.owner);
  if (data.purchasePrice !== null && data.purchasePrice !== undefined) setVal('f_purchase', data.purchasePrice);
}

function setVal(id, val) {
  var el = document.getElementById(id);
  if (el) el.value = val;
}

function setStatus(msg, cls) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function clearAll() {
  ['f_card','f_set','f_number','f_purchase'].forEach(function(id) { setVal(id, ''); });
  setVal('f_owner', 'P');
  setStatus('', '');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function saveToSheet() {
  var card = document.getElementById('f_card').value.trim();
  if (!card) { showToast('Please enter a card name'); return; }
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  var n = new Date();
  var pad = function(x) { return String(x).padStart(2,'0'); };
  var today = pad(n.getDate())+'.'+pad(n.getMonth()+1)+'.'+n.getFullYear();
  var payload = {
    cardName: card,
    set: document.getElementById('f_set').value.trim().toUpperCase(),
    number: document.getElementById('f_number').value.trim(),
    owner: document.getElementById('f_owner').value,
    purchasePrice: document.getElementById('f_purchase').value,
    submissionCost: '', submissionDate: today,
    grade: '', gradedValue: '', salePrice: ''
  };
  fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) { showToast('Saved to row ' + data.row + '!'); clearAll(); }
      else { showToast('Error: ' + (data.error || 'Unknown')); }
    })
    .catch(function(e) { showToast('Error: ' + e.message); })
    .finally(function() { btn.disabled = false; btn.textContent = 'Save to Sheet'; });
}
</script>
</body>
</html>
